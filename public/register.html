<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>註冊 - 器材租賃平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body p-5">
            <h2 class="text-center mb-4">註冊</h2>
            <form id="registerForm">
              <div class="mb-3">
                <label for="username" class="form-label">帳號</label>
                <input type="text" class="form-control" id="username" required minlength="3">
                <div class="form-text">至少 3 個字元，可使用英文、數字</div>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">密碼</label>
                <input type="password" class="form-control" id="password" required minlength="6">
                <div class="form-text">至少 6 個字元</div>
              </div>
              <div class="mb-3">
                <label for="name" class="form-label">姓名</label>
                <input type="text" class="form-control" id="name" required>
              </div>
              <div class="mb-3">
                <label class="form-label">角色</label>
                <div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="role" id="roleRenter" value="renter" checked>
                    <label class="form-check-label" for="roleRenter">租用者</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="role" id="roleOwner" value="owner">
                    <label class="form-check-label" for="roleOwner">器材擁有者</label>
                  </div>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 mb-3">註冊</button>
            </form>
            <div class="text-center">
              <p class="text-muted">已有帳號？ <a href="/login.html">立即登入</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        name: document.getElementById('name').value,
        role: document.querySelector('input[name="role"]:checked').value
      };
      
      try {
        const result = await API.auth.register(data);
        Utils.showToast('註冊成功！', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1000);
      } catch (error) {
        Utils.showToast(error.message || '註冊失敗', 'danger');
      }
    });
  </script>
</body>
</html>
