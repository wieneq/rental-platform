<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>器材詳情 - 器材租賃平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="fas fa-tools"></i> 器材租賃平台
      </a>
    </div>
  </nav>

  <div class="container py-5">
    <div id="equipmentDetail">
      <div class="text-center">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

  <!-- 預約模態框 -->
  <div class="modal fade" id="bookingModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">預約器材</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="bookingForm">
            <div class="mb-3">
              <label class="form-label">開始時間</label>
              <input type="datetime-local" class="form-control" id="startTime" required>
            </div>
            <div class="mb-3">
              <label class="form-label">結束時間</label>
              <input type="datetime-local" class="form-control" id="endTime" required>
            </div>
            <div class="alert alert-info" id="priceInfo" style="display:none;"></div>
            <button type="submit" class="btn btn-primary w-100">確認預約</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
  <script src="/js/api.js"></script>
  <script>
    let equipment = null;
    let calendar = null;
    let selectedSlot = null; // 儲存選擇的時段
    let startTime = null; // 儲存開始時間
    let tempEvent = null; // 臨時標記事件
    const bookingModal = new bootstrap.Modal(document.getElementById('bookingModal'));
    
    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      
      if (!id) {
        window.location.href = '/equipment-list.html';
        return;
      }
      
      try {
        equipment = await API.equipment.getById(id);
        renderEquipment();
        await initCalendar();
      } catch (error) {
        document.getElementById('equipmentDetail').innerHTML = `
          <div class="alert alert-danger">載入失敗：${error.message}</div>
        `;
      }
    }
    
    function renderEquipment() {
      const html = `
        <div class="row">
          <div class="col-md-5">
            <img src="${equipment.image}" class="img-fluid rounded" alt="${equipment.name}">
          </div>
          <div class="col-md-7">
            <span class="badge bg-secondary mb-2">${equipment.category}</span>
            <h2>${equipment.name}</h2>
            <p class="text-muted">${equipment.description}</p>
            <hr>
            <div class="row mb-3">
              <div class="col-6">
                <h4 class="text-primary">${Utils.formatCurrency(equipment.hourlyRate)}/小時</h4>
              </div>
              <div class="col-6">
                <p class="mb-0 text-muted">押金：${Utils.formatCurrency(equipment.depositAmount)}</p>
              </div>
            </div>
            <p><i class="fas fa-user"></i> 擁有者：${equipment.ownerName}</p>
            <button class="btn btn-primary btn-lg" onclick="openBookingModal()">
              <i class="fas fa-calendar-plus"></i> 立即預約
            </button>
          </div>
        </div>
        
        <hr class="my-5">
        
        <h3 class="mb-4">預約時段</h3>
        <div class="alert alert-warning mb-3" id="clickHint" style="display:block;">
          <i class="fas fa-hand-pointer"></i> 請先點擊<strong>開始時間</strong>，再點擊<strong>結束時間</strong>
        </div>
        <div class="alert alert-info mb-3" id="selectedTimeInfo" style="display:none;">
          <i class="fas fa-info-circle"></i> <span id="selectedTimeText"></span>
        </div>
        <div class="calendar-container">
          <div id="calendar"></div>
        </div>
        <div class="text-center mt-3">
          <button class="btn btn-secondary btn-lg me-2" id="resetBtn" onclick="resetSelection()">
            <i class="fas fa-redo"></i> 重新選擇
          </button>
          <button class="btn btn-success btn-lg" id="confirmBookingBtn" disabled>
            <i class="fas fa-check-circle"></i> 確認預約此時段
          </button>
        </div>
      `;
      
      document.getElementById('equipmentDetail').innerHTML = html;
      
      // 在 DOM 更新後綁定事件
      document.getElementById('confirmBookingBtn').addEventListener('click', confirmAndOpenModal);
    }
    
    async function initCalendar() {
      const bookings = await API.bookings.getAll({ equipmentId: equipment.id });
      
      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'timeGridWeek,timeGridDay'
        },
        locale: 'zh-tw',
        slotMinTime: '08:00:00',
        slotMaxTime: '22:00:00',
        slotDuration: '01:00:00',
        allDaySlot: false,
        selectable: false,
        editable: false,
        events: bookings.map(b => ({
          title: '已預約',
          start: b.startTime,
          end: b.endTime,
          color: '#e74c3c',
          extendedProps: {
            type: 'booked'
          }
        })),
        dateClick: function(info) {
          handleTimeSlotClick(info.date, info.jsEvent);
        }
      });
      
      calendar.render();
    }
    
    function handleTimeSlotClick(clickedDate) {
      // 確保點擊的時間是整點
      const roundedDate = new Date(clickedDate);
      roundedDate.setMinutes(0, 0, 0);
      
      if (!startTime) {
        // 第一次點擊：設置開始時間
        startTime = roundedDate;
        
        // 在日曆上添加臨時標記
        if (tempEvent) {
          tempEvent.remove();
        }
        tempEvent = calendar.addEvent({
          title: '開始',
          start: startTime,
          end: new Date(startTime.getTime() + 60 * 60 * 1000), // +1小時
          color: '#3498db',
          extendedProps: {
            type: 'temp-start'
          }
        });
        
        // 更新提示訊息
        const startStr = formatDateTimeDisplay(startTime);
        document.getElementById('clickHint').innerHTML = 
          `<i class="fas fa-hand-pointer"></i> 已選擇開始時間：<strong>${startStr}</strong>，請點擊<strong>結束時間</strong>`;
        document.getElementById('selectedTimeInfo').style.display = 'none';
        document.getElementById('confirmBookingBtn').disabled = true;
        
      } else {
        // 第二次點擊：設置結束時間
        const endTime = new Date(roundedDate.getTime() + 60 * 60 * 1000); // 結束時間加1小時（包含該時段）
        
        // 驗證結束時間必須晚於開始時間
        if (endTime <= startTime) {
          Utils.showToast('結束時間必須晚於開始時間，請重新選擇', 'warning');
          resetSelection();
          return;
        }
        
        // 儲存選擇的時段
        selectedSlot = {
          start: startTime,
          end: endTime
        };
        
        // 計算小時數
        const hours = Math.ceil((endTime - startTime) / (1000 * 60 * 60));
        
        // 更新臨時事件顯示完整時段
        if (tempEvent) {
          tempEvent.remove();
        }
        tempEvent = calendar.addEvent({
          title: `選擇: ${hours}小時`,
          start: startTime,
          end: endTime,
          color: '#2ecc71',
          extendedProps: {
            type: 'temp-selected'
          }
        });
        
        // 更新提示訊息
        const startStr = formatDateTimeDisplay(startTime);
        const endStr = formatDateTimeDisplay(endTime);
        document.getElementById('clickHint').style.display = 'none';
        document.getElementById('selectedTimeInfo').style.display = 'block';
        document.getElementById('selectedTimeText').innerHTML = 
          `已選擇時段：<strong>${startStr}</strong> 至 <strong>${endStr}</strong> (${hours} 小時)`;
        
        // 啟用確認按鈕
        document.getElementById('confirmBookingBtn').disabled = false;
        
        // 重置開始時間，準備下次選擇
        startTime = null;
      }
    }
    
    function resetSelection() {
      startTime = null;
      selectedSlot = null;
      
      if (tempEvent) {
        tempEvent.remove();
        tempEvent = null;
      }
      
      document.getElementById('clickHint').style.display = 'block';
      document.getElementById('clickHint').innerHTML = 
        `<i class="fas fa-hand-pointer"></i> 請先點擊<strong>開始時間</strong>，再點擊<strong>結束時間</strong>`;
      document.getElementById('selectedTimeInfo').style.display = 'none';
      document.getElementById('confirmBookingBtn').disabled = true;
    }
    
    async function openBookingModal() {
      const user = localStorage.getItem('user');
      if (!user) {
        // 自動以租用者身份登入（展示版）
        try {
          const result = await API.auth.login({ 
            username: 'guest', 
            password: 'guest', 
            role: 'renter' 
          });
          localStorage.setItem('user', JSON.stringify(result.user));
          Utils.showToast('已自動登入為租用者', 'info');
        } catch (error) {
          alert('自動登入失敗，請手動登入');
          window.location.href = '/login.html';
          return;
        }
      }
      bookingModal.show();
    }
    
    function formatDateTimeLocal(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return `${year}-${month}-${day}T${hours}:${minutes}`;
    }
    
    function formatDateTimeDisplay(date) {
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return `${month}/${day} ${hours}:${minutes}`;
    }
    
    async function confirmAndOpenModal() {
      console.log('confirmAndOpenModal 被呼叫', selectedSlot);
      
      if (!selectedSlot) {
        Utils.showToast('請先在日曆上選擇時段', 'warning');
        return;
      }
      
      // 將選擇的時段填入表單
      document.getElementById('startTime').value = formatDateTimeLocal(selectedSlot.start);
      document.getElementById('endTime').value = formatDateTimeLocal(selectedSlot.end);
      calculatePrice();
      
      // 打開預約對話框
      await openBookingModal();
    }
    
    function calculatePrice() {
      const start = new Date(document.getElementById('startTime').value);
      const end = new Date(document.getElementById('endTime').value);
      
      if (start && end && end > start) {
        const hours = Math.ceil((end - start) / (1000 * 60 * 60));
        const total = hours * equipment.hourlyRate;
        document.getElementById('priceInfo').style.display = 'block';
        document.getElementById('priceInfo').innerHTML = `
          <strong>租用時數：</strong>${hours} 小時<br>
          <strong>總金額：</strong>${Utils.formatCurrency(total)}
        `;
      }
    }
    
    document.getElementById('startTime').addEventListener('change', calculatePrice);
    document.getElementById('endTime').addEventListener('change', calculatePrice);
    
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const startTime = document.getElementById('startTime').value;
      const endTime = document.getElementById('endTime').value;
      
      try {
        // 檢查可用性
        const availability = await API.bookings.checkAvailability({
          equipmentId: equipment.id,
          startTime,
          endTime
        });
        
        if (!availability.available) {
          alert('此時段已被預約，請選擇其他時段');
          return;
        }
        
        // 建立預約
        const booking = await API.bookings.create({
          equipmentId: equipment.id,
          startTime,
          endTime
        });
        
        Utils.showToast('預約成功！', 'success');
        bookingModal.hide();
        
        // 重置選擇
        resetSelection();
        
        // 導向簽約頁面
        setTimeout(() => {
          window.location.href = `/contract-sign.html?bookingId=${booking.booking.id}`;
        }, 1000);
      } catch (error) {
        Utils.showToast(error.message || '預約失敗', 'danger');
      }
    });
    
    init();
  </script>
</body>
</html>
