<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>共享器材租賃管理平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 導航列 -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="fas fa-tools"></i> 器材租賃平台
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/equipment-list.html">瀏覽器材</a>
          </li>
          <li class="nav-item" id="navLogin">
            <a class="nav-link" href="/login.html">登入</a>
          </li>
          <li class="nav-item" id="navDashboard" style="display:none;">
            <a class="nav-link" href="/dashboard.html">控制台</a>
          </li>
          <li class="nav-item" id="navLogout" style="display:none;">
            <a class="nav-link" href="#" onclick="handleLogout()">登出</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 主視覺區 -->
  <section class="hero-section">
    <div class="container">
      <h1 class="display-4 mb-4">共享經濟，輕鬆租賃</h1>
      <p class="lead mb-5">專業器材隨時租，省錢又環保</p>
      <a href="/equipment-list.html" class="btn btn-light btn-lg btn-custom me-3">
        <i class="fas fa-search"></i> 瀏覽所有器材
      </a>
      <a href="/register.html" class="btn btn-outline-light btn-lg btn-custom">
        <i class="fas fa-user-plus"></i> 立即註冊
      </a>
    </div>
  </section>

  <!-- 功能介紹 -->
  <section class="py-5">
    <div class="container">
      <h2 class="text-center mb-5">為什麼選擇我們？</h2>
      <div class="row g-4">
        <div class="col-md-3 text-center">
          <div class="card card-hover h-100 p-4">
            <div class="mb-3">
              <i class="fas fa-calendar-check fa-3x text-primary"></i>
            </div>
            <h5>即時預約</h5>
            <p class="text-muted">視覺化日曆，隨時查看可用時段</p>
          </div>
        </div>
        <div class="col-md-3 text-center">
          <div class="card card-hover h-100 p-4">
            <div class="mb-3">
              <i class="fas fa-file-signature fa-3x text-success"></i>
            </div>
            <h5>線上簽約</h5>
            <p class="text-muted">電子簽名，自動生成租約文件</p>
          </div>
        </div>
        <div class="col-md-3 text-center">
          <div class="card card-hover h-100 p-4">
            <div class="mb-3">
              <i class="fas fa-shield-alt fa-3x text-warning"></i>
            </div>
            <h5>押金保障</h5>
            <p class="text-muted">透明化押金管理，安心租賃</p>
          </div>
        </div>
        <div class="col-md-3 text-center">
          <div class="card card-hover h-100 p-4">
            <div class="mb-3">
              <i class="fas fa-tools fa-3x text-danger"></i>
            </div>
            <h5>報修追蹤</h5>
            <p class="text-muted">問題即時回報，快速處理</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 熱門器材 -->
  <section class="py-5 bg-white">
    <div class="container">
      <h2 class="text-center mb-5">熱門器材</h2>
      <div class="row g-4" id="popularEquipment">
        <div class="col-12 text-center">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- 頁尾 -->
  <footer class="footer">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 共享器材租賃管理平台 | 展示版本</p>
      <p class="small text-muted">預設密碼：demo123</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    // 檢查登入狀態
    async function init() {
      const user = await checkAuth();
      if (user) {
        document.getElementById('navLogin').style.display = 'none';
        document.getElementById('navDashboard').style.display = 'block';
        document.getElementById('navLogout').style.display = 'block';
      }
      
      // 載入熱門器材
      loadPopularEquipment();
    }
    
    async function loadPopularEquipment() {
      try {
        const equipment = await API.equipment.getAll();
        const container = document.getElementById('popularEquipment');
        
        if (equipment.length === 0) {
          container.innerHTML = '<p class="text-muted">目前沒有器材</p>';
          return;
        }
        
        const html = equipment.slice(0, 4).map(e => `
          <div class="col-md-3">
            <div class="card equipment-card">
              <img src="${e.image}" class="card-img-top" alt="${e.name}">
              <div class="card-body">
                <h5 class="card-title">${e.name}</h5>
                <p class="card-text text-muted small">${e.description.substring(0, 50)}...</p>
                <p class="mb-2">
                  <strong class="text-primary">${Utils.formatCurrency(e.hourlyRate)}/小時</strong>
                </p>
                <a href="/equipment-detail.html?id=${e.id}" class="btn btn-primary btn-sm w-100">查看詳情</a>
              </div>
            </div>
          </div>
        `).join('');
        
        container.innerHTML = html;
      } catch (error) {
        document.getElementById('popularEquipment').innerHTML = 
          '<p class="text-danger">載入失敗</p>';
      }
    }
    
    async function handleLogout() {
      try {
        await API.auth.logout();
        Utils.showToast('已登出', 'success');
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } catch (error) {
        Utils.showToast('登出失敗', 'danger');
      }
    }
    
    init();
  </script>
</body>
</html>
