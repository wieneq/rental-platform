<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簽署租約 - 器材租賃平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="fas fa-tools"></i> 器材租賃平台
      </a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow">
          <div class="card-body p-5">
            <h2 class="text-center mb-4">線上簽署租約</h2>
            
            <div id="contractPreview">
              <div class="text-center">
                <div class="loading-spinner"></div>
              </div>
            </div>
            
            <div id="signatureSection" style="display:none;">
              <hr class="my-4">
              <h4 class="mb-3">請在下方簽名</h4>
              <div class="text-center mb-3">
                <canvas id="signaturePad" class="signature-pad-canvas"></canvas>
              </div>
              <div class="text-center mb-4">
                <button class="btn btn-secondary me-2" onclick="clearSignature()">
                  <i class="fas fa-eraser"></i> 清除
                </button>
                <button class="btn btn-primary" onclick="submitSignature()">
                  <i class="fas fa-check"></i> 確認簽署
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    let booking = null;
    let equipment = null;
    let signaturePad = null;
    
    async function init() {
      const user = await requireAuth();
      if (!user) return;
      
      const urlParams = new URLSearchParams(window.location.search);
      const bookingId = urlParams.get('bookingId');
      
      if (!bookingId) {
        window.location.href = '/dashboard.html';
        return;
      }
      
      try {
        // 取得預約資訊
        const bookings = await API.bookings.getAll();
        booking = bookings.find(b => b.id === parseInt(bookingId));
        
        if (!booking) {
          throw new Error('預約不存在');
        }
        
        // 取得器材資訊
        equipment = await API.equipment.getById(booking.equipmentId);
        
        renderContract();
        initSignaturePad();
      } catch (error) {
        document.getElementById('contractPreview').innerHTML = `
          <div class="alert alert-danger">載入失敗：${error.message}</div>
        `;
      }
    }
    
    function renderContract() {
      const html = `
        <div class="border p-4 mb-4 bg-light">
          <h4 class="mb-3">租約預覽</h4>
          <div class="row mb-2">
            <div class="col-4 fw-bold">器材名稱：</div>
            <div class="col-8">${equipment.name}</div>
          </div>
          <div class="row mb-2">
            <div class="col-4 fw-bold">類別：</div>
            <div class="col-8">${equipment.category}</div>
          </div>
          <div class="row mb-2">
            <div class="col-4 fw-bold">租用時段：</div>
            <div class="col-8">
              ${Utils.formatDate(booking.startTime)} ~ ${Utils.formatDate(booking.endTime)}
            </div>
          </div>
          <div class="row mb-2">
            <div class="col-4 fw-bold">租用時數：</div>
            <div class="col-8">${booking.totalHours} 小時</div>
          </div>
          <div class="row mb-2">
            <div class="col-4 fw-bold">時薪：</div>
            <div class="col-8">${Utils.formatCurrency(equipment.hourlyRate)}</div>
          </div>
          <div class="row mb-2">
            <div class="col-4 fw-bold text-primary">總金額：</div>
            <div class="col-8 text-primary fs-5 fw-bold">${Utils.formatCurrency(booking.totalAmount)}</div>
          </div>
          <div class="row mb-2">
            <div class="col-4 fw-bold">押金：</div>
            <div class="col-8">${Utils.formatCurrency(equipment.depositAmount)}</div>
          </div>
          
          <hr class="my-3">
          
          <h5 class="mb-2">租賃條款</h5>
          <ol class="small">
            <li>租用者必須按時歸還器材</li>
            <li>如有損毀將從押金中扣除</li>
            <li>租用者負責器材安全</li>
            <li>逾時歸還可能產生額外費用</li>
          </ol>
        </div>
      `;
      
      document.getElementById('contractPreview').innerHTML = html;
      document.getElementById('signatureSection').style.display = 'block';
    }
    
    function initSignaturePad() {
      const canvas = document.getElementById('signaturePad');
      
      // 響應式調整畫布大小
      function resizeCanvas() {
        const container = canvas.parentElement;
        const containerWidth = container.offsetWidth;
        
        // 設置畫布的實際顯示尺寸
        const maxWidth = Math.min(containerWidth - 20, 600); // 最大 600px，但不超過容器寬度
        const height = Math.max(150, Math.min(200, maxWidth / 3)); // 高度根據寬度調整
        
        canvas.style.width = maxWidth + 'px';
        canvas.style.height = height + 'px';
        
        // 設置畫布的實際像素密度
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = maxWidth * ratio;
        canvas.height = height * ratio;
        
        const context = canvas.getContext('2d');
        context.scale(ratio, ratio);
        
        // 如果 signaturePad 已初始化，清除並重置
        if (signaturePad) {
          signaturePad.clear();
        }
      }
      
      // 初始化 SignaturePad
      signaturePad = new SignaturePad(canvas, {
        backgroundColor: 'rgb(255, 255, 255)',
        penColor: 'rgb(0, 0, 0)'
      });
      
      // 監聽視窗大小變化
      window.addEventListener('resize', resizeCanvas);
      
      // 初始化時調整大小
      resizeCanvas();
    }
    
    function clearSignature() {
      signaturePad.clear();
    }
    
    async function submitSignature() {
      if (signaturePad.isEmpty()) {
        Utils.showToast('請先簽名', 'warning');
        return;
      }
      
      try {
        const signatureData = signaturePad.toDataURL('image/png');
        
        // 提交簽名
        const result = await API.contracts.sign({
          bookingId: booking.id,
          signature: signatureData
        });
        
        Utils.showToast('簽署成功！', 'success');
        
        // 顯示成功訊息並導向租約列表
        setTimeout(() => {
          window.location.href = '/my-contracts.html';
        }, 2000);
      } catch (error) {
        Utils.showToast(error.message || '簽署失敗', 'danger');
      }
    }
    
    init();
  </script>
</body>
</html>
