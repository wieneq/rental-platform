<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>器材列表 - 器材租賃平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 導航列 -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="fas fa-tools"></i> 器材租賃平台
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="/equipment-list.html">瀏覽器材</a>
          </li>
          <li class="nav-item" id="navDashboard">
            <a class="nav-link" href="/dashboard.html">控制台</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/login.html">登入</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 主內容 -->
  <div class="container py-5">
    <h2 class="mb-4">所有器材</h2>
    
    <!-- 篩選 -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">類別</label>
            <select class="form-select" id="filterCategory">
              <option value="">全部類別</option>
              <option value="攝影器材">攝影器材</option>
              <option value="電腦設備">電腦設備</option>
              <option value="音訊設備">音訊設備</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">狀態</label>
            <select class="form-select" id="filterStatus">
              <option value="">全部狀態</option>
              <option value="available">可租用</option>
              <option value="unavailable">不可用</option>
            </select>
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-primary w-100" onclick="loadEquipment()">
              <i class="fas fa-search"></i> 搜尋
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 器材列表 -->
    <div class="row g-4" id="equipmentList">
      <div class="col-12 text-center">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    async function loadEquipment() {
      const category = document.getElementById('filterCategory').value;
      const status = document.getElementById('filterStatus').value;
      
      const params = {};
      if (category) params.category = category;
      if (status) params.status = status;
      
      try {
        const equipment = await API.equipment.getAll(params);
        const container = document.getElementById('equipmentList');
        
        if (equipment.length === 0) {
          container.innerHTML = `
            <div class="col-12 text-center">
              <p class="text-muted">沒有找到符合條件的器材</p>
            </div>
          `;
          return;
        }
        
        const html = equipment.map(e => `
          <div class="col-md-4">
            <div class="card equipment-card h-100">
              <img src="${e.image}" class="card-img-top" alt="${e.name}">
              <div class="card-body d-flex flex-column">
                <span class="badge bg-secondary mb-2 align-self-start">${e.category}</span>
                <h5 class="card-title">${e.name}</h5>
                <p class="card-text text-muted small flex-grow-1">${e.description}</p>
                <div class="mb-2">
                  <strong class="text-primary fs-5">${Utils.formatCurrency(e.hourlyRate)}/小時</strong>
                </div>
                <p class="small text-muted mb-3">
                  <i class="fas fa-user"></i> ${e.ownerName} | 
                  <i class="fas fa-shield-alt"></i> 押金 ${Utils.formatCurrency(e.depositAmount)}
                </p>
                <a href="/equipment-detail.html?id=${e.id}" class="btn btn-primary mt-auto">
                  <i class="fas fa-calendar-check"></i> 查看詳情並預約
                </a>
              </div>
            </div>
          </div>
        `).join('');
        
        container.innerHTML = html;
      } catch (error) {
        document.getElementById('equipmentList').innerHTML = `
          <div class="col-12 text-center">
            <p class="text-danger">載入失敗：${error.message}</p>
          </div>
        `;
      }
    }
    
    // 初始載入
    loadEquipment();
  </script>
</body>
</html>
