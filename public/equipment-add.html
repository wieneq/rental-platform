<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增器材 - 器材租賃平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="fas fa-tools"></i> 器材租賃平台
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/dashboard.html">控制台</a>
        <a class="nav-link" href="#" onclick="handleLogout()">登出</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow">
          <div class="card-body p-5">
            <h2 class="mb-4">新增器材</h2>
            
            <form id="equipmentForm">
              <div class="mb-3">
                <label for="name" class="form-label">器材名稱 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" required>
              </div>

              <div class="mb-3">
                <label for="category" class="form-label">類別 <span class="text-danger">*</span></label>
                <select class="form-select" id="category" required>
                  <option value="">請選擇類別</option>
                  <option value="攝影器材">攝影器材</option>
                  <option value="手機">手機</option>
                  <option value="電腦">電腦</option>
                  <option value="電玩主機">電玩主機</option>
                  <option value="音響設備">音響設備</option>
                  <option value="運動器材">運動器材</option>
                  <option value="工具">工具</option>
                  <option value="其他">其他</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="description" class="form-label">描述 <span class="text-danger">*</span></label>
                <textarea class="form-control" id="description" rows="4" required></textarea>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="hourlyRate" class="form-label">時薪 (NT$) <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" id="hourlyRate" min="0" step="1" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="depositAmount" class="form-label">押金 (NT$) <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" id="depositAmount" min="0" step="1" required>
                </div>
              </div>

              <div class="mb-3">
                <label for="image" class="form-label">圖片網址（選填）</label>
                <input type="url" class="form-control" id="image" placeholder="https://...">
                <small class="text-muted">留空將使用預設圖片</small>
              </div>

              <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <a href="/dashboard.html" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-plus"></i> 新增器材
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    async function init() {
      const user = await requireAuth();
      if (!user) return;
      
      // 檢查權限：只有器材擁有者和管理員可以新增
      if (user.role !== 'owner' && user.role !== 'admin') {
        Utils.showToast('您沒有權限新增器材', 'danger');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 2000);
      }
    }
    
    document.getElementById('equipmentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        name: document.getElementById('name').value.trim(),
        category: document.getElementById('category').value,
        description: document.getElementById('description').value.trim(),
        hourlyRate: parseFloat(document.getElementById('hourlyRate').value),
        depositAmount: parseFloat(document.getElementById('depositAmount').value),
        image: document.getElementById('image').value.trim()
      };
      
      // 驗證
      if (!data.name || !data.category || !data.description || !data.hourlyRate || !data.depositAmount) {
        Utils.showToast('請填寫所有必填欄位', 'warning');
        return;
      }
      
      if (data.hourlyRate <= 0 || data.depositAmount <= 0) {
        Utils.showToast('時薪和押金必須大於 0', 'warning');
        return;
      }
      
      try {
        await API.equipment.create(data);
        Utils.showToast('器材新增成功！', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1500);
      } catch (error) {
        Utils.showToast(error.message || '新增失敗', 'danger');
      }
    });

    async function handleLogout() {
      try {
        await API.auth.logout();
        Utils.showToast('已登出', 'success');
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } catch (error) {
        Utils.showToast('登出失敗', 'danger');
      }
    }
    
    init();
  </script>
</body>
</html>
