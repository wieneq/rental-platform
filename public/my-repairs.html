<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報修記錄 - 器材租賃平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="fas fa-tools"></i> 器材租賃平台
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/dashboard.html">控制台</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0">報修記錄</h2>
      <button class="btn btn-primary" onclick="openRepairModal()">
        <i class="fas fa-plus"></i> 新增報修
      </button>
    </div>
    
    <div id="repairList">
      <div class="text-center">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

  <!-- 新增報修模態框 -->
  <div class="modal fade" id="repairModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">新增報修</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="repairForm">
            <div class="mb-3">
              <label class="form-label">選擇預約記錄 <span class="text-danger">*</span></label>
              <select class="form-select" id="bookingId" required>
                <option value="">請選擇已完成的預約...</option>
              </select>
              <small class="text-muted">僅顯示已完成的預約</small>
            </div>
            
            <div class="mb-3">
              <label class="form-label">問題描述 <span class="text-danger">*</span></label>
              <textarea class="form-control" id="description" rows="4" required 
                placeholder="請詳細描述器材損壞或問題狀況..."></textarea>
            </div>
            
            <div class="mb-3">
              <label class="form-label">嚴重程度 <span class="text-danger">*</span></label>
              <select class="form-select" id="severity" required>
                <option value="">請選擇...</option>
                <option value="minor">輕微 - 小刮傷、髒污等</option>
                <option value="moderate">中度 - 功能部分受損</option>
                <option value="severe">嚴重 - 無法正常使用</option>
              </select>
            </div>
            
            <div class="mb-3">
              <label class="form-label">上傳照片（選填）</label>
              <input type="file" class="form-control" id="photoInput" accept="image/*" multiple>
              <small class="text-muted">可上傳多張照片，最多 3 張</small>
              <div id="photoPreview" class="mt-2"></div>
            </div>
            
            <div class="alert alert-info">
              <i class="fas fa-info-circle"></i> 提交報修後，管理員將會審核並處理您的報修申請。
            </div>
            
            <button type="submit" class="btn btn-primary w-100">
              <i class="fas fa-paper-plane"></i> 提交報修
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    let currentUser = null;
    let repairModal = null;
    let uploadedPhotos = [];
    
    async function init() {
      currentUser = await requireAuth();
      if (!currentUser) return;
      
      repairModal = new bootstrap.Modal(document.getElementById('repairModal'));
      
      await loadRepairs();
      
      // 綁定表單提交事件
      document.getElementById('repairForm').addEventListener('submit', handleRepairSubmit);
      
      // 綁定照片上傳事件
      document.getElementById('photoInput').addEventListener('change', handlePhotoUpload);
    }
    
    async function openRepairModal() {
      // 載入已完成的預約列表
      await loadCompletedBookings();
      
      // 重置表單
      document.getElementById('repairForm').reset();
      uploadedPhotos = [];
      document.getElementById('photoPreview').innerHTML = '';
      
      repairModal.show();
    }
    
    async function loadCompletedBookings() {
      try {
        const bookings = await API.bookings.getAll();
        
        // 篩選已完成的預約
        const completedBookings = bookings.filter(b => b.status === 'completed');
        
        const select = document.getElementById('bookingId');
        
        if (completedBookings.length === 0) {
          select.innerHTML = '<option value="">沒有已完成的預約可報修</option>';
          select.disabled = true;
          return;
        }
        
        select.disabled = false;
        select.innerHTML = '<option value="">請選擇已完成的預約...</option>' +
          completedBookings.map(b => `
            <option value="${b.id}">
              ${b.equipmentName} - ${Utils.formatDate(b.startTime)}
            </option>
          `).join('');
      } catch (error) {
        Utils.showToast('載入預約列表失敗', 'danger');
      }
    }
    
    function handlePhotoUpload(e) {
      const files = Array.from(e.target.files);
      
      if (files.length > 3) {
        Utils.showToast('最多只能上傳 3 張照片', 'warning');
        e.target.value = '';
        return;
      }
      
      uploadedPhotos = [];
      const previewContainer = document.getElementById('photoPreview');
      previewContainer.innerHTML = '';
      
      files.forEach((file, index) => {
        if (file.size > 5 * 1024 * 1024) {
          Utils.showToast(`照片 ${index + 1} 檔案過大（最大 5MB）`, 'warning');
          return;
        }
        
        const reader = new FileReader();
        reader.onload = (e) => {
          uploadedPhotos.push(e.target.result);
          
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'img-thumbnail me-2 mb-2';
          img.style.width = '100px';
          img.style.height = '100px';
          img.style.objectFit = 'cover';
          previewContainer.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    }
    
    async function handleRepairSubmit(e) {
      e.preventDefault();
      
      const bookingId = document.getElementById('bookingId').value;
      const description = document.getElementById('description').value.trim();
      const severity = document.getElementById('severity').value;
      
      if (!bookingId || !description || !severity) {
        Utils.showToast('請填寫所有必填欄位', 'warning');
        return;
      }
      
      try {
        const data = {
          bookingId: parseInt(bookingId),
          description,
          severity,
          photos: uploadedPhotos
        };
        
        await API.repairs.create(data);
        
        Utils.showToast('報修已提交，管理員將盡快處理', 'success');
        repairModal.hide();
        
        // 重新載入報修列表
        await loadRepairs();
      } catch (error) {
        Utils.showToast(error.message || '提交報修失敗', 'danger');
      }
    }
    
    async function loadRepairs() {
      try {
        const repairs = await API.repairs.getAll();
        const container = document.getElementById('repairList');
        
        if (repairs.length === 0) {
          container.innerHTML = `
            <div class="alert alert-info">
              <i class="fas fa-info-circle"></i> 沒有報修記錄
            </div>
          `;
          return;
        }
        
        const severityClass = {
          minor: 'bg-info',
          moderate: 'bg-warning',
          severe: 'bg-danger'
        };
        
        const severityText = {
          minor: '輕微',
          moderate: '中度',
          severe: '嚴重'
        };
        
        const statusClass = {
          pending: 'bg-warning',
          in_progress: 'bg-primary',
          resolved: 'bg-success'
        };
        
        const statusText = {
          pending: '待處理',
          in_progress: '處理中',
          resolved: '已解決'
        };
        
        const html = repairs.map(r => `
          <div class="card mb-3">
            <div class="card-body">
              <div class="row">
                <div class="col-md-8">
                  <h5 class="mb-2">
                    <i class="fas fa-wrench"></i> ${r.equipmentName}
                  </h5>
                  <p class="mb-2">${r.description}</p>
                  
                  ${r.photos && r.photos.length > 0 ? `
                  <div class="mb-2">
                    ${r.photos.map(photo => `
                      <img src="${photo}" class="img-thumbnail me-1" 
                           style="width: 80px; height: 80px; object-fit: cover; cursor: pointer;"
                           onclick="window.open('${photo}', '_blank')">
                    `).join('')}
                  </div>
                  ` : ''}
                  
                  <p class="small text-muted mb-1">
                    <i class="fas fa-clock"></i> ${Utils.formatDate(r.createdAt)}
                  </p>
                  
                  ${r.adminNotes ? `
                  <div class="alert alert-secondary mb-0 mt-2">
                    <strong><i class="fas fa-user-shield"></i> 管理員回覆：</strong> ${r.adminNotes}
                  </div>
                  ` : ''}
                </div>
                <div class="col-md-4 text-end">
                  <span class="badge ${severityClass[r.severity]} mb-2">
                    ${severityText[r.severity]}
                  </span>
                  <br>
                  <span class="badge ${statusClass[r.status]}">
                    ${statusText[r.status]}
                  </span>
                </div>
              </div>
            </div>
          </div>
        `).join('');
        
        container.innerHTML = html;
      } catch (error) {
        document.getElementById('repairList').innerHTML = `
          <div class="alert alert-danger">載入失敗：${error.message}</div>
        `;
      }
    }
    
    init();
  </script>
</body>
</html>
