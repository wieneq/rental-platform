<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報修記錄 - 器材租賃平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="fas fa-tools"></i> 器材租賃平台
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/dashboard.html">控制台</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="mb-4">報修記錄</h2>
    
    <div id="repairList">
      <div class="text-center">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    async function init() {
      const user = await requireAuth();
      if (!user) return;
      
      await loadRepairs();
    }
    
    async function loadRepairs() {
      try {
        const repairs = await API.repairs.getAll();
        const container = document.getElementById('repairList');
        
        if (repairs.length === 0) {
          container.innerHTML = `
            <div class="alert alert-info">
              <i class="fas fa-info-circle"></i> 沒有報修記錄
            </div>
          `;
          return;
        }
        
        const severityClass = {
          minor: 'bg-info',
          moderate: 'bg-warning',
          severe: 'bg-danger'
        };
        
        const severityText = {
          minor: '輕微',
          moderate: '中度',
          severe: '嚴重'
        };
        
        const statusClass = {
          pending: 'bg-warning',
          in_progress: 'bg-primary',
          resolved: 'bg-success'
        };
        
        const statusText = {
          pending: '待處理',
          in_progress: '處理中',
          resolved: '已解決'
        };
        
        const html = repairs.map(r => `
          <div class="card mb-3">
            <div class="card-body">
              <div class="row">
                <div class="col-md-8">
                  <h5 class="mb-2">${r.equipmentName}</h5>
                  <p class="mb-2">${r.description}</p>
                  <p class="small text-muted mb-1">
                    <i class="fas fa-clock"></i> ${Utils.formatDate(r.createdAt)}
                  </p>
                  ${r.adminNotes ? `
                  <div class="alert alert-secondary mb-0 mt-2">
                    <strong>管理員回覆：</strong> ${r.adminNotes}
                  </div>
                  ` : ''}
                </div>
                <div class="col-md-4 text-end">
                  <span class="badge ${severityClass[r.severity]} mb-2">${severityText[r.severity]}</span>
                  <br>
                  <span class="badge ${statusClass[r.status]}">${statusText[r.status]}</span>
                </div>
              </div>
            </div>
          </div>
        `).join('');
        
        container.innerHTML = html;
      } catch (error) {
        document.getElementById('repairList').innerHTML = `
          <div class="alert alert-danger">載入失敗：${error.message}</div>
        `;
      }
    }
    
    init();
  </script>
</body>
</html>
