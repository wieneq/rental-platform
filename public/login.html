<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 - 器材租賃平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-body p-5">
            <h2 class="text-center mb-4">登入</h2>
            <form id="loginForm">
              <div class="mb-3">
                <label for="role" class="form-label">選擇角色</label>
                <select class="form-select" id="role" required>
                  <option value="">請選擇角色</option>
                  <option value="admin">管理員</option>
                  <option value="owner">器材擁有者</option>
                  <option value="renter">租用者</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="username" class="form-label">帳號</label>
                <input type="text" class="form-control" id="username" placeholder="可隨意輸入">
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">密碼</label>
                <input type="password" class="form-control" id="password" placeholder="可隨意輸入">
              </div>
              <button type="submit" class="btn btn-primary w-100 mb-3">登入</button>
            </form>
            <div class="text-center">
              <p class="text-muted">還沒有帳號？ <a href="/register.html">立即註冊</a></p>
              <p class="small text-muted">展示版本 - 選擇角色即可登入</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const role = document.getElementById('role').value;
      const username = document.getElementById('username').value || 'demo';
      const password = document.getElementById('password').value || 'demo';
      
      if (!role) {
        Utils.showToast('請選擇角色', 'warning');
        return;
      }
      
      try {
        const result = await API.auth.login({ username, password, role });
        Utils.showToast('登入成功！', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1000);
      } catch (error) {
        Utils.showToast(error.message || '登入失敗', 'danger');
      }
    });
  </script>
</body>
</html>
