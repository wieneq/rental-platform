<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的租約 - 器材租賃平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="fas fa-tools"></i> 器材租賃平台
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/dashboard.html">控制台</a>
        <a class="nav-link" href="#" onclick="handleLogout()">登出</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="mb-4">我的租約</h2>
    
    <div id="contractList">
      <div class="text-center">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    async function init() {
      const user = await requireAuth();
      if (!user) return;
      
      await loadContracts();
    }
    
    async function loadContracts() {
      try {
        const contracts = await API.contracts.getAll();
        const container = document.getElementById('contractList');
        
        if (contracts.length === 0) {
          container.innerHTML = `
            <div class="alert alert-info">
              <i class="fas fa-info-circle"></i> 您還沒有任何租約
            </div>
          `;
          return;
        }
        
        const html = contracts.map(c => `
          <div class="card mb-3">
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col-md-6">
                  <h5 class="mb-2">${c.equipmentName || '未知器材'}</h5>
                  <p class="mb-1">
                    <i class="fas fa-file-contract"></i> 
                    <strong>租約編號：</strong>${c.contractNumber}
                  </p>
                  <p class="mb-1 text-muted small">
                    <i class="fas fa-calendar"></i> 
                    ${c.startTime ? Utils.formatDate(c.startTime) + ' ~ ' + Utils.formatDate(c.endTime) : '時間未知'}
                  </p>
                  <p class="mb-0 text-muted small">
                    <i class="fas fa-clock"></i> 
                    簽署時間：${Utils.formatDate(c.signedAt)}
                  </p>
                </div>
                <div class="col-md-3">
                  <span class="badge ${c.status === 'signed' ? 'bg-success' : 'bg-secondary'} p-2">
                    ${c.status === 'signed' ? '已簽署' : c.status}
                  </span>
                </div>
                <div class="col-md-3 text-end">
                  <a href="${API.contracts.download(c.id)}" class="btn btn-primary btn-sm" download>
                    <i class="fas fa-download"></i> 下載 PDF
                  </a>
                </div>
              </div>
            </div>
          </div>
        `).join('');
        
        container.innerHTML = html;
      } catch (error) {
        document.getElementById('contractList').innerHTML = `
          <div class="alert alert-danger">載入失敗：${error.message}</div>
        `;
      }
    }
    
    async function handleLogout() {
      try {
        await API.auth.logout();
        window.location.href = '/';
      } catch (error) {
        Utils.showToast('登出失敗', 'danger');
      }
    }
    
    init();
  </script>
</body>
</html>
