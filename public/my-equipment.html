<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的器材 - 器材租賃平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="fas fa-tools"></i> 器材租賃平台
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/dashboard.html">控制台</a>
        <a class="nav-link" href="#" onclick="handleLogout()">登出</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>我的器材</h2>
      <a href="/equipment-add.html" class="btn btn-primary">
        <i class="fas fa-plus"></i> 新增器材
      </a>
    </div>
    
    <div id="equipmentList">
      <div class="text-center">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    let currentUser = null;

    async function init() {
      currentUser = await requireAuth();
      if (!currentUser) return;
      
      // 檢查權限：只有器材擁有者和管理員可以訪問
      if (currentUser.role !== 'owner' && currentUser.role !== 'admin') {
        Utils.showToast('您沒有權限訪問此頁面', 'danger');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 2000);
        return;
      }
      
      await loadEquipment();
    }
    
    async function loadEquipment() {
      try {
        const allEquipment = await API.equipment.getAll();
        const myEquipment = allEquipment.filter(e => e.ownerId === currentUser.id);
        
        if (myEquipment.length === 0) {
          document.getElementById('equipmentList').innerHTML = `
            <div class="alert alert-info text-center">
              <i class="fas fa-info-circle"></i> 您還沒有新增任何器材
              <br><br>
              <a href="/equipment-add.html" class="btn btn-primary">立即新增</a>
            </div>
          `;
          return;
        }
        
        const html = `
          <div class="row g-4">
            ${myEquipment.map(equipment => `
              <div class="col-md-6">
                <div class="card card-hover h-100">
                  <div class="row g-0">
                    <div class="col-md-4">
                      <img src="${equipment.image}" class="img-fluid rounded-start h-100" style="object-fit: cover;" alt="${equipment.name}">
                    </div>
                    <div class="col-md-8">
                      <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                          <h5 class="card-title mb-0">${equipment.name}</h5>
                          <span class="badge ${equipment.status === 'available' ? 'bg-success' : 'bg-secondary'}">
                            ${equipment.status === 'available' ? '可租用' : '不可用'}
                          </span>
                        </div>
                        <p class="text-muted small mb-2">${equipment.category}</p>
                        <p class="card-text small mb-3">${equipment.description.substring(0, 80)}${equipment.description.length > 80 ? '...' : ''}</p>
                        <div class="mb-3">
                          <strong>時薪：</strong>${Utils.formatCurrency(equipment.hourlyRate)}<br>
                          <strong>押金：</strong>${Utils.formatCurrency(equipment.depositAmount)}
                        </div>
                        <div class="btn-group" role="group">
                          <a href="/equipment-detail.html?id=${equipment.id}" class="btn btn-sm btn-outline-primary">查看</a>
                          <button class="btn btn-sm btn-outline-danger" onclick="deleteEquipment(${equipment.id})">刪除</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        
        document.getElementById('equipmentList').innerHTML = html;
      } catch (error) {
        document.getElementById('equipmentList').innerHTML = `
          <div class="alert alert-danger">載入失敗：${error.message}</div>
        `;
      }
    }
    
    async function deleteEquipment(id) {
      if (!confirm('確定要刪除此器材嗎？')) {
        return;
      }
      
      try {
        await API.equipment.delete(id);
        Utils.showToast('器材已刪除', 'success');
        await loadEquipment();
      } catch (error) {
        Utils.showToast(error.message || '刪除失敗', 'danger');
      }
    }

    async function handleLogout() {
      try {
        await API.auth.logout();
        Utils.showToast('已登出', 'success');
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } catch (error) {
        Utils.showToast('登出失敗', 'danger');
      }
    }
    
    init();
  </script>
</body>
</html>
